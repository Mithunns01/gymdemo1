# Dev Profile - H2 In-Memory Database (no MySQL needed)
spring.application.name=gymdemo-dev
server.port=8080

spring.datasource.url=jdbc:h2:mem:gymdemo;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

jwt.secret=MySuperSecretKeyForGymManagementSystem2024!@#$%^&*()VeryLongSecretKey91234567890
jwt.expiration=86400000

springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

